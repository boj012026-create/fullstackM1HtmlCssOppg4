<!DOCTYPE html>
<html lang="no">
<head>
    <meta name="author" content="Jan Olav">
    <meta name="keywords" content="kreativitet, craftsvilla, familie, venner, kunst, opplevelse, booking">
    <meta name="description" content="oppgave i html og css, lage en kreativ og innbydende side for ett selskap som tilbyr kunst workshopper til voksne, familie, venner og barn">
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lugrasimo&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>CraftsVilla</title>
</head>
<body>
    <header>
	<section class="header-top">
	    <figure><img src="./img/waves.jpg" alt="chocolate colored wavy lines"></figure>
	    <div><h1>Crafts Villa</h1></div>

	    <figure><img src="./img/waves.jpg" alt="chocolate colored wavy lines"></figure>
	</section>
	<nav>
	    <a class="nav-btn" href="./index.html">
		<img src="./img/icon/home.svg" alt="outline of tiny house">
		Hjem
	    </a>
	    <a class="nav-btn btn-clicked" href="./booking.html">
		<img src="./img/icon/booking.svg" alt="outline of checkboard with check mark">
		Booking
	    </a>
	    <a class="nav-btn" href="./gallery.html">
		<img src="./img/icon/gallery.svg" alt="outline square with muntain and sun">
		Galleri
	    </a>
	    <a class="nav-btn" href="./feedback.html">
		<img src="./img/icon/feedback.svg" alt="outline of person, with speech boublee">
		Ris & Ros
	    </a>
	</nav>
    </header>
    <main class="double-columns">
	    <article class="booking">
	        <h2>Booking</h2>
	        <form action="submit">
		    <label for="mosaik">Mosaikk - 400kr</label>
	            <input type="radio" id="mosaik" name="art-form"
			value="mosaikk">
	            <label class="field" for="mosaik">
Ramme, A4-størrelse treplate, små fargede steiner, gummi.
		    </label>
		    <h4>Akvarellmaling - 200kr</h4>
	            <input type="radio" id="akvarellmaling" name="art-form"
			value="mosaikk">
	            <label class="field" for="akvarellmaling">
			Ramme, Akrylpapir med designmal, akvarellfarger, pensler.
		    </label>
		    <label for="lerretsmaling">Lerretsmaling - 300kr</label>
	            <input type="radio" id="lerretsmaling" name="art-form"
			value="lerretsmaling">
	            <label class="field" for="lerretsmaling">
			Ramme, akrylpapir med designmal, akrylfarger, pensler
		    </label>
		    <label for="user-name">Navn</label>
		    <input id="user-name" type="text" placeholder="Ola Nordmann">
		    <label for="user-email">Epost</label>
		    <input id="user-email" type="email" placeholder="Ola@outllok.no">
		    <label for="booking-date">Dato</label>
		    <input id="booking-date" type="date" placeholder="01.01.2026">

	            <button class="submit-btn">
			<img src="./img/icon/cart_check.svg" alt="outline of cart with a check mark">
			Bestill</button>
	        </form>
	    </article>
	    <article class="booking">
	        <h2>Workshops</h2>
	            <img src="./img/calendar.jpg" alt="colorfull abstract painting with black lines barelt giving the oulinesof a happy bunny or puppy">
	    </article>
    </main>
</body>
</html>
